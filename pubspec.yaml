name: minimal_clock
description: A beautiful minimalist clock app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  wakelock_plus: ^1.2.8
  intl: ^0.19.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  supabase_flutter: ^2.6.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  share_plus: ^10.1.2
  url_launcher: ^6.3.0
  app_links: ^7.0.0
  google_fonts: ^6.2.1
  watch_connectivity: ^0.2.9
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
