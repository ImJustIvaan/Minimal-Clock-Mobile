name: Build tvOS App

# Builds the standalone MinimalClockTV target for the Simulator SDK, which
# needs no code signing/provisioning — this only verifies it compiles.
# There's no free sideloading path for tvOS (unlike AltStore/Sideloadly for
# iOS), so getting this onto an actual Apple TV still needs Xcode + either a
# paid developer account or a directly-connected device in developer mode.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-tvos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # The tvOS target itself has no Flutter/plugin code, but Xcode
      # resolves the *whole* project's Swift Package graph before it even
      # looks at the requested scheme — and the project references
      # ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage,
      # which only gets generated by `flutter pub get`. Without this step
      # the package resolution fails before the TV target is touched at all.
      - name: Install dependencies
        run: flutter pub get

      # -destination (not -sdk) is what modern Xcode actually uses to
      # resolve a scheme's platform for a non-default-platform target —
      # see the watchOS build fix in build-unsigned-ipa.yml for why.
      - name: Build MinimalClockTV for tvOS Simulator
        run: |
          xcodebuild build \
            -project ios/Runner.xcodeproj \
            -scheme MinimalClockTV \
            -destination 'generic/platform=tvOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
