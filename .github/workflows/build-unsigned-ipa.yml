name: Build Unsigned iOS IPA

# Builds an UNSIGNED .ipa. This will not install via Xcode, TestFlight, or
# any tool that checks Apple's code signature. It's meant to be signed on
# your own machine afterward with a free Apple ID, using a sideloading tool
# like AltStore/AltServer or Sideloadly.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # Built separately from Runner (not as a project dependency), because
      # `flutter build ios` invokes xcodebuild with an explicit -sdk
      # iphoneos, which forces that same SDK onto any dependency target
      # built in the same invocation — breaking the watchOS target, which
      # needs its own SDK. Building it as its own xcodebuild call and
      # copying the result in avoids that entirely.
      #
      # -sdk and -scheme+-destination both got overridden back to the iOS
      # SDK for this specific target — its Info.plist declares
      # WKCompanionAppBundleIdentifier (needed so the built app actually
      # pairs with the phone once installed), and Xcode's scheme-based
      # destination resolution seems to treat that as a hint to resolve
      # through the iOS companion, ignoring the requested destination.
      # -target bypasses scheme/destination inference entirely and builds
      # straight from the target's own project settings (SDKROOT=watchos).
      # -derivedDataPath requires -scheme (xcodebuild refuses it with a bare
      # -target), so use SYMROOT instead — a plain build-setting override,
      # which -target builds honor fine. That puts the product at
      # $SYMROOT/$CONFIGURATION-$PLATFORM_NAME/MinimalClockWatch.app.
      - name: Build watchOS companion app
        run: |
          xcodebuild build \
            -project ios/Runner.xcodeproj \
            -target MinimalClockWatch \
            -configuration Release \
            SYMROOT=build/watch_dd \
            CODE_SIGNING_ALLOWED=NO

      # SYMROOT=build/watch_dd was resolved relative to -project's directory
      # (ios/), not the repo root, so the product landed at
      # ios/build/watch_dd/... rather than build/watch_dd/...
      - name: Embed watchOS app into Runner.app
        run: |
          mkdir -p build/ios/iphoneos/Runner.app/Watch
          cp -r ios/build/watch_dd/Release-watchos/MinimalClockWatch.app \
            build/ios/iphoneos/Runner.app/Watch/

      - name: Package into IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MinimalClock.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock.ipa
          path: build/ios/ipa/MinimalClock.ipa
